<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Ultra Boss Mode</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background: linear-gradient(-45deg,#ff9a9e,#fad0c4,#ffdde1,#ffc3a0);
  background-size:400% 400%;
  animation: gradientBG 12s ease infinite;
}

@keyframes gradientBG{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ICON BAY */
.icon{
  position:fixed;
  font-size:22px;
  animation: floatIcon linear infinite;
  opacity:0.8;
  pointer-events:none;
}

@keyframes floatIcon{
  0%{ transform: translateY(100vh) rotate(0deg);}
  100%{ transform: translateY(-10vh) rotate(360deg);}
}

/* KHUNG */
.box{
  position:relative;
  width:420px;
  padding:40px;
  border-radius:25px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.15);
  border:2px solid rgba(255,255,255,0.4);
  text-align:center;
  cursor:pointer;
  transition:0.3s;
  animation: glow 3s ease-in-out infinite;
  overflow:hidden;
}

.box:hover{
  transform: scale(1.05);
}

@keyframes glow{
  0%{ box-shadow:0 0 15px rgba(255,255,255,0.3);}
  50%{ box-shadow:0 0 35px rgba(255,100,200,0.6);}
  100%{ box-shadow:0 0 15px rgba(255,255,255,0.3);}
}

h1{
  font-size:32px;
  color:white;
}

#content{
  margin-top:20px;
  font-size:22px;
  color:white;
  min-height:60px;
}

/* TIM NHỎ */
.small-heart{
  position:absolute;
  font-size:18px;
  animation: pulse 1.5s infinite;
}

@keyframes pulse{
  0%{ transform:scale(1);}
  50%{ transform:scale(1.3);}
  100%{ transform:scale(1);}
}

/* PHÁO HOA */
.particle{
  position:fixed;
  pointer-events:none;
  font-size:20px;
  animation: explode 1.2s ease-out forwards;
}

@keyframes explode{
  0%{opacity:1; transform:scale(0.5);}
  100%{opacity:0; transform:translate(var(--x),var(--y)) scale(1.5);}
}

/* HIỆU ỨNG VỠ */
.break{
  animation: breakBox 0.6s ease forwards;
}

@keyframes breakBox{
  0%{transform:scale(1);}
  50%{transform:scale(1.15) rotate(3deg);}
  100%{transform:scale(0.95);}
}

</style>
</head>

<body>

<div class="box" onclick="startAll()" id="box">
  <h1>💌 Bấm để mở 💌</h1>
  <div id="content"></div>
</div>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
let text="Chúc mừng nhé ✨ Ultra Boss Mode đã được kích hoạt 😎💖";
let i=0;
let started=false;

function startAll(){
  if(started) return;
  started=true;

  document.getElementById("music").play();
  document.getElementById("box").classList.add("break");

  setTimeout(()=>{
    typeEffect();
    spawnHearts();
  },600);
}

function typeEffect(){
  if(i<text.length){
    document.getElementById("content").innerHTML+=text.charAt(i);
    i++;
    setTimeout(typeEffect,35);
  }else{
    heartFirework();
  }
}

/* ICON BAY */
let icons=["✨","💞","💓","💗","💖","🎉","💯","🎊","🌟","🌷","🌹","🪷","🌸","🍁","🌻","🐱"];

function createIcon(){
  let icon=document.createElement("div");
  icon.className="icon";
  icon.innerText=icons[Math.floor(Math.random()*icons.length)];
  icon.style.left=Math.random()*100+"vw";
  icon.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(icon);
  setTimeout(()=>{icon.remove();},10000);
}
setInterval(createIcon,700);

/* Tim quanh khung */
function spawnHearts(){
  for(let j=0;j<12;j++){
    let heart=document.createElement("div");
    heart.className="small-heart";
    heart.innerText="💖";
    heart.style.top=Math.random()*100+"%";
    heart.style.left=Math.random()*100+"%";
    document.getElementById("box").appendChild(heart);
  }
}

/* Pháo hoa trái tim */
function heartFirework(){
  let colors=["#ff4d6d","#ff85a1","#ff006e","#ffd166","#f72585","#b5179e"];

  for(let k=0;k<60;k++){
    let p=document.createElement("div");
    p.className="particle";
    p.innerText="💗";
    p.style.color=colors[Math.floor(Math.random()*colors.length)];
    p.style.left="50%";
    p.style.top="50%";

    let t=Math.random()*Math.PI*2;
    let r=200*Math.sin(t)*Math.sqrt(Math.abs(Math.cos(t)))/(Math.sin(t)+1.4)-2*Math.sin(t)+2;
    let x=r*Math.cos(t)*60+"px";
    let y=-r*Math.sin(t)*60+"px";

    p.style.setProperty("--x",x);
    p.style.setProperty("--y",y);

    document.body.appendChild(p);
    setTimeout(()=>{p.remove();},1200);
  }
}
</script>

</body>
</html>
