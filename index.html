<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chúc mừng 8/3 - 9A10</title>

<style>
body{
margin:0;
height:100vh;
overflow:hidden;
font-family:Arial;
background:linear-gradient(135deg,#ff2e7a,#ff6aa8);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* BOX MỞ */
#startBox{
position:absolute;
padding:30px 50px;
font-size:26px;
background:rgba(255,255,255,0.2);
border-radius:20px;
backdrop-filter:blur(10px);
cursor:pointer;
text-align:center;
box-shadow:0 0 25px rgba(255,255,255,0.6);
transition:0.3s;
z-index:10;
}

#startBox:hover{
transform:scale(1.05);
}

/* BOX LỜI CHÚC */
#wishBox{
position:absolute;
padding:30px 40px;
max-width:80%;
text-align:center;
font-size:24px;
background:rgba(255,255,255,0.15);
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(255,255,255,0.4);
display:none;
z-index:5;
}

/* ICON RƠI */
.icon{
position:fixed;
top:-30px;
font-size:18px;
animation:fall linear forwards;
pointer-events:none;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

/* TIM BẮN */
.heart{
position:absolute;
font-size:22px;
animation:burst 1s forwards;
}

@keyframes burst{
to{
transform:translate(var(--x),var(--y));
opacity:0;
}
}

</style>
</head>

<body>

<div id="startBox">💌 Bấm vào đây 💌</div>

<div id="wishBox">
<span id="text"></span>
</div>

<script>

/* ICON LIST */
const icons=["💓","💞","💖","💗","🎉","💯","🎊","🌟","✨","🌷","🌹","🪷","🌸","🍁","🌻","🐱"];

/* ICON RƠI */
function createIcon(){
const icon=document.createElement("div");
icon.className="icon";
icon.innerText=icons[Math.floor(Math.random()*icons.length)];

icon.style.left=Math.random()*100+"vw";
icon.style.animationDuration=(4+Math.random()*3)+"s";

document.body.appendChild(icon);

setTimeout(()=>icon.remove(),7000);
}

setInterval(createIcon,250);

/* TIM BẮN */
function heartBurst(){
for(let i=0;i<12;i++){
const h=document.createElement("div");
h.className="heart";
h.innerText="💖";

h.style.left="50%";
h.style.top="50%";

let x=(Math.random()-0.5)*300+"px";
let y=(Math.random()-0.5)*300+"px";

h.style.setProperty("--x",x);
h.style.setProperty("--y",y);

document.body.appendChild(h);

setTimeout(()=>h.remove(),1000);
}
}

/* LỜI CHÚC */
const wishes=[

"Chúc các bạn nữ 9A10 luôn xinh đẹp và rạng rỡ 🌸",
"Chúc mọi người luôn vui vẻ mỗi ngày 🌷",
"Luôn tràn đầy năng lượng tích cực ✨",
"Ngày càng học giỏi hơn 💯",
"Luôn tỏa sáng theo cách riêng của mình 🌟",
"Luôn gặp nhiều may mắn 🍀",
"Luôn được yêu thương và trân trọng 💞",
"Chúc mọi điều tốt đẹp nhất 🌹",
"Luôn cười thật nhiều 😄",
"Luôn đạt được mục tiêu của mình 🎯",
"Chúc 8/3 thật ý nghĩa 💐",
"Luôn mạnh mẽ và tự tin 🌻",
"Luôn xinh đẹp theo cách của riêng bạn 💖",
"Luôn vui vẻ bên bạn bè 🐱",
"Chúc những điều tuyệt vời nhất sẽ đến 🎊",
"Luôn gặp những điều tích cực 🌸",
"Luôn tràn đầy động lực học tập 📚",
"Chúc các bạn luôn hạnh phúc 💗",
"Luôn có thật nhiều tiếng cười 🎉",
"Chúc một ngày 8/3 thật đáng nhớ 🌷"

];

let index=0;

function showWish(){

const text=document.getElementById("text");

let str=wishes[index];
let i=0;
text.innerHTML="";

function type(){
if(i<str.length){
text.innerHTML+=str.charAt(i);
i++;
setTimeout(type,40);
}
}

type();

index=(index+1)%wishes.length;
}

setInterval(showWish,4000);

/* CLICK */
document.getElementById("startBox").onclick=()=>{

heartBurst();

document.getElementById("startBox").style.display="none";
document.getElementById("wishBox").style.display="block";

showWish();

};

</script>

</body>
</html>
