<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>8/3 - 9A10 FINAL</title>

<style>
body{
    margin:0;
    padding:0;
    overflow:hidden;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family: 'Segoe UI', sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    color:white;
}

/* Màn hình mở đầu */
#startScreen{
    position:fixed;
    inset:0;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
    cursor:pointer;
}

#startScreen h2{
    font-size:28px;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

.box{
    background: rgba(255,255,255,0.15);
    padding:60px;
    border-radius:30px;
    backdrop-filter: blur(18px);
    box-shadow: 0 0 40px rgba(255,255,255,0.4);
    max-width:90%;
    display:none;
}

h1{
    font-size:46px;
    margin-bottom:30px;
    text-shadow:0 0 20px white;
}

.line{
    font-size:26px;
    margin:15px 0;
    min-height:35px;
    text-shadow:0 0 12px white;
}

/* Tim */
.heart{
    position:absolute;
    font-size:22px;
    animation: floatUp linear forwards;
}
@keyframes floatUp{
    from{transform:translateY(100vh);opacity:1;}
    to{transform:translateY(-10vh) scale(1.5);opacity:0;}
}

/* Hoa */
.flower{
    position:absolute;
    top:-10px;
    font-size:20px;
    animation: fall linear forwards;
}
@keyframes fall{
    to{transform:translateY(110vh) rotate(360deg);}
}

/* Pháo hoa */
.firework{
    position:absolute;
    font-size:30px;
    animation: explode 1s ease-out forwards;
}
@keyframes explode{
    0%{transform:scale(0);opacity:1;}
    100%{transform:scale(2);opacity:0;}
}
</style>
</head>

<body>

<div id="startScreen">
    <h2>💖 Bấm vào đây để mở điều đặc biệt 💖</h2>
</div>

<div class="box" id="mainBox">
    <h1>🌸 Happy Women's Day 8/3 🌸</h1>
    <div id="message"></div>
</div>

<audio id="bgm" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b8f8b.mp3" type="audio/mp3">
</audio>

<script>
const startScreen = document.getElementById("startScreen");
const box = document.getElementById("mainBox");
const audio = document.getElementById("bgm");

startScreen.onclick = () => {
    startScreen.style.display="none";
    box.style.display="block";
    audio.volume=0;
    audio.play();
    fadeInMusic();
    showLines(0);
};

function fadeInMusic(){
    let vol=0;
    const fade=setInterval(()=>{
        if(vol<1){
            vol+=0.05;
            audio.volume=vol;
        }else clearInterval(fade);
    },200);
}

const lines=[
"💖 Chúc các bạn nữ 9A10 một ngày 8/3 thật rực rỡ!",
"🌷 Luôn xinh đẹp theo cách riêng của mình.",
"📚 Học giỏi, tự tin và đạt được mọi mục tiêu.",
"✨ Mỗi ngày đến lớp đều tràn ngập tiếng cười.",
"💌 From 9A10 Boys."
];

const container=document.getElementById("message");

function typeWriter(text,element,speed,callback){
    let i=0;
    function typing(){
        if(i<text.length){
            element.innerHTML+=text.charAt(i);
            i++;
            setTimeout(typing,speed);
        }else if(callback){
            setTimeout(callback,600);
        }
    }
    typing();
}

function showLines(index){
    if(index>=lines.length){
        launchFireworks();
        return;
    }
    const p=document.createElement("div");
    p.classList.add("line");
    container.appendChild(p);
    typeWriter(lines[index],p,35,()=>showLines(index+1));
}

/* Tim + Hoa */
setInterval(()=>{
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="💖";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(4+Math.random()*3)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),7000);
},400);

setInterval(()=>{
    const flower=document.createElement("div");
    flower.classList.add("flower");
    flower.innerHTML="🌸";
    flower.style.left=Math.random()*100+"vw";
    flower.style.animationDuration=(6+Math.random()*4)+"s";
    document.body.appendChild(flower);
    setTimeout(()=>flower.remove(),10000);
},600);

/* Pháo hoa */
function launchFireworks(){
    for(let i=0;i<20;i++){
        setTimeout(()=>{
            const fw=document.createElement("div");
            fw.classList.add("firework");
            fw.innerHTML="✨";
            fw.style.left=Math.random()*100+"vw";
            fw.style.top=Math.random()*100+"vh";
            document.body.appendChild(fw);
            setTimeout(()=>fw.remove(),1000);
        },i*200);
    }
}
</script>

</body>
</html>
