<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc mừng 8/3 - 9A10</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#ff3d7f,#ff7aa5);
font-family:sans-serif;
color:white;
}

/* ICON RƠI */

.icon{
position:fixed;
top:-50px;
font-size:20px;
animation:fall linear forwards;
pointer-events:none;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
opacity:0.9;
}
}

/* BOX ĐẦU */

#startBox{
position:relative;
padding:35px 55px;
font-size:22px;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(10px);
border-radius:20px;
box-shadow:0 0 40px rgba(255,255,255,0.6);
cursor:pointer;
transition:0.3s;
}

#startBox:hover{
transform:scale(1.08);
}

/* TIM 4 GÓC */

.cornerHeart{
position:absolute;
font-size:24px;
animation:beat 1.2s infinite;
}

.topLeft{top:-12px;left:-12px;}
.topRight{top:-12px;right:-12px;}
.bottomLeft{bottom:-12px;left:-12px;}
.bottomRight{bottom:-12px;right:-12px;}

@keyframes beat{
0%{transform:scale(1);}
30%{transform:scale(1.35);}
60%{transform:scale(1);}
100%{transform:scale(1);}
}

/* NỘI DUNG LỜI CHÚC */

#content{
position:absolute;
text-align:center;
width:90%;
max-width:600px;
font-size:26px;
display:none;
line-height:1.5;
}

</style>
</head>

<body>

<!-- BOX BẤM -->

<div id="startBox" onclick="startEvent()">

💖 Bấm để mở điều đặc biệt 💖

<div class="cornerHeart topLeft">💗</div>
<div class="cornerHeart topRight">💖</div>
<div class="cornerHeart bottomLeft">💞</div>
<div class="cornerHeart bottomRight">💓</div>

</div>


<!-- LỜI CHÚC -->

<div id="content"></div>


<script>

/* ICON LIST */

const icons=[
"💓","💞","💖","💗","🎉","🎊","🌟","✨","🌷","🌹","🪷","🌸","🍁","🌻","🐱"
];

/* ICON RƠI */

function spawnIcon(){

const icon=document.createElement("div");

icon.className="icon";

icon.innerText=icons[Math.floor(Math.random()*icons.length)];

icon.style.left=Math.random()*100+"vw";

icon.style.animationDuration=4+Math.random()*3+"s";

document.body.appendChild(icon);

setTimeout(()=>icon.remove(),7000);

}

setInterval(spawnIcon,400);


/* TIM BẮN RA */

function heartBurst(){

for(let i=0;i<12;i++){

const heart=document.createElement("div");

heart.innerText="💗";

heart.style.position="fixed";
heart.style.left="50%";
heart.style.top="50%";
heart.style.fontSize="24px";
heart.style.pointerEvents="none";

document.body.appendChild(heart);

const angle=Math.random()*360;
const dist=150+Math.random()*100;

heart.animate([
{transform:"translate(-50%,-50%) scale(1)"},
{transform:`translate(calc(-50% + ${Math.cos(angle)*dist}px),calc(-50% + ${Math.sin(angle)*dist}px)) scale(1.6)`,opacity:0}
],{duration:900,easing:"ease-out"});

setTimeout(()=>heart.remove(),900);

}

}


/* LỜI CHÚC */

const wishes=[

"Chúc các bạn nữ 9A10 luôn xinh đẹp 🌸",
"Luôn vui vẻ và tràn đầy năng lượng 🌷",
"Ngày nào cũng cười thật nhiều 🌟",
"Luôn học giỏi và đạt nhiều thành tích 🎓",
"Luôn được mọi người yêu quý 💖",
"Mỗi ngày đều thật rực rỡ ✨",
"Luôn tự tin và tỏa sáng 🌟",
"Chúc các bạn luôn may mắn 🍀",
"Luôn đạt được ước mơ của mình 💫",
"Thanh xuân thật đẹp và đáng nhớ 🌸",
"Luôn vui vẻ bên bạn bè 🫶",
"Ngày nào cũng hạnh phúc 🌷",
"Luôn tràn đầy năng lượng tích cực ☀️",
"Chúc 9A10 mãi đoàn kết 🎉",
"Luôn xinh xắn và đáng yêu 💞",
"Chúc mọi điều tốt đẹp đến với các bạn 💖",
"Luôn thành công trong học tập 📚",
"Luôn mạnh mẽ và tự tin 💫",
"Chúc ngày 8/3 thật ý nghĩa 🌹",
"9A10 mãi đỉnh 🔥"

];


/* TYPEWRITER */

let wishIndex=0;

function showWish(){

const content=document.getElementById("content");

content.innerHTML="";

let text=wishes[wishIndex];

let i=0;

function type(){

if(i<text.length){

content.innerHTML+=text.charAt(i);

i++;

setTimeout(type,50);

}else{

setTimeout(()=>{
wishIndex=(wishIndex+1)%wishes.length;
showWish();
},2000);

}

}

type();

}


/* START EVENT */

function startEvent(){

heartBurst();

document.getElementById("startBox").style.display="none";

const content=document.getElementById("content");

content.style.display="block";

showWish();

}

</script>

</body>
</html>
