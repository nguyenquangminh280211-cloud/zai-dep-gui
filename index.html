<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>8/3 - 9A10</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
font-family:sans-serif;
background:linear-gradient(135deg,#ff4d88,#ff7aa8);
}

/* ICON RƠI */

.icon{
position:fixed;
top:-30px;
font-size:20px;
pointer-events:none;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-50px) translateX(0);opacity:0;}
10%{opacity:1;}
100%{transform:translateY(110vh) translateX(60px);opacity:0;}
}

/* BOX */

#startBox{
position:relative;
padding:35px 70px;
background:rgba(255,255,255,0.35);
backdrop-filter:blur(10px);
border-radius:25px;
color:white;
font-size:22px;
text-align:center;
box-shadow:0 0 30px rgba(255,255,255,0.5);
cursor:pointer;
transition:0.3s;
}

#startBox:hover{
transform:scale(1.05);
}

/* TIM GÓC */

.cornerHeart{
position:absolute;
font-size:26px;
animation:heartbeat 1.2s infinite;
}

.topLeft{top:-15px;left:-15px;}
.topRight{top:-15px;right:-15px;}
.bottomLeft{bottom:-15px;left:-15px;}
.bottomRight{bottom:-15px;right:-15px;}

@keyframes heartbeat{
0%{transform:scale(1);}
25%{transform:scale(1.35);}
40%{transform:scale(1);}
60%{transform:scale(1.35);}
100%{transform:scale(1);}
}

/* LỜI CHÚC */

#wishBox{
display:none;
max-width:85%;
padding:30px;
background:rgba(255,255,255,0.35);
backdrop-filter:blur(10px);
border-radius:25px;
color:white;
font-size:22px;
text-align:center;
box-shadow:0 0 30px rgba(255,255,255,0.5);
}

/* PHÁO HOA */

.firework{
position:fixed;
font-size:26px;
animation:boom 1s forwards;
pointer-events:none;
}

@keyframes boom{
0%{
transform:scale(0);
opacity:1;
}
100%{
transform:scale(2.2);
opacity:0;
}
}

</style>
</head>

<body>

<div id="startBox" onclick="startEvent()">
💖 Bấm để mở điều đặc biệt 💖

<div class="cornerHeart topLeft">💗</div>
<div class="cornerHeart topRight">💖</div>

<div class="cornerHeart bottomRight">💓</div>

</div>

<div id="wishBox">

</div>

function spawnIcon(){

let icon=document.createElement("div");
icon.className="icon";
icon.innerHTML=icons[Math.floor(Math.random()*icons.length)];

icon.style.left=Math.random()*100+"vw";
icon.style.animationDuration=(6+Math.random()*3)+"s";

document.body.appendChild(icon);

setTimeout(()=>icon.remove(),9000);

}

setInterval(spawnIcon,700);

let y=centerY+Math.sin(angle)*distance;

heart.style.top=y+"px";

setTimeout(()=>heart.remove(),1000);

}

let wishIndex=0;

function typeWriter(){

if(wishIndex>=wishes.length){

return;

}

if(charIndex<current.length){

document.getElementById("text").innerHTML+=current.charAt(charIndex);

setTimeout(typeWriter,35);

}else{

setTimeout(()=>{

document.getElementById("text").innerHTML+="<br><br>";

wishIndex++;

typeWriter();

},1200);

}

}

/* PHÁO HOA CUỐI */

function fireworkShow(){

setInterval(()=>{

document.body.appendChild(fw);

setTimeout(()=>fw.remove(),1000);

},700);

}
