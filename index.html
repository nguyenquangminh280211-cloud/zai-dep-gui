<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>8/3 - 9A10 SMOOTH</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at center,#ff758c,#ff7eb3,#ff9a9e);
    font-family:'Segoe UI',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    color:white;
}

/* START */
#startScreen{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#ff4e80,#ff85a1);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    cursor:pointer;
}

#startScreen h2{
    font-size:28px;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    50%{transform:scale(1.1);}
}

/* BOX */
.box{
    background:rgba(255,255,255,0.18);
    padding:50px;
    border-radius:25px;
    box-shadow:0 0 30px rgba(255,255,255,0.4);
    max-width:90%;
    display:none;
}

h1{
    font-size:40px;
    margin-bottom:25px;
}

.line{
    font-size:24px;
    margin:15px 0;
    min-height:35px;
}

/* ICON BAY MƯỢT */
.icon{
    position:absolute;
    font-size:24px;
    animation:float linear forwards;
    will-change:transform;
}

@keyframes float{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh);}
}

/* HẠT PHÁO */
.particle{
    position:absolute;
    width:6px;
    height:6px;
    border-radius:50%;
    pointer-events:none;
}
</style>
</head>

<body>

<div id="startScreen">
<h2>💖 Bấm để mở 💖</h2>
</div>

<div class="box" id="mainBox">

<div id="message"></div>
</div>

<audio id="bgm" loop>

</audio>

<script>
const startScreen=document.getElementById("startScreen");
const box=document.getElementById("mainBox");
const audio=document.getElementById("bgm");

startScreen.onclick=()=>{
    startScreen.style.display="none";
    box.style.display="block";
    audio.volume=0.2;
    audio.play();
    showLines(0);
};

/* TEXT */
const lines=[

"📚 Học giỏi, tự tin và đạt được mọi mục tiêu.",
"✨ Mỗi ngày đến lớp đều tràn ngập tiếng cười."
];

const container=document.getElementById("message");

function typeWriter(text,element,speed,callback){
    let i=0;
    function typing(){
        if(i<text.length){
            element.innerHTML+=text.charAt(i);
            i++;
            setTimeout(typing,speed);
        }else if(callback){
            setTimeout(callback,500);
        }
    }
    typing();
}

function showLines(index){
    if(index>=lines.length){
        launchHeartFireworks();
        return;
    }
    const p=document.createElement("div");
    p.classList.add("line");
    container.appendChild(p);
    typeWriter(lines[index],p,25,()=>showLines(index+1));
}
