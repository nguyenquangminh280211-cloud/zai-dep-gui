<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc mừng 8/3 - 9A10</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff2e7a,#ff6aa6);
}

/* icon rơi */

.fall{
position:fixed;
top:-20px;
font-size:20px;
pointer-events:none;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
opacity:0;
}
}

/* box đầu */

#box{
position:relative;
background:rgba(255,255,255,0.25);
padding:35px 60px;
border-radius:20px;
backdrop-filter:blur(10px);
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 25px rgba(255,255,255,0.5);
transition:0.3s;
}

#box:hover{
transform:scale(1.05);
}

/* tim 4 góc */

.corner{
position:absolute;
font-size:22px;
animation:beat 1s infinite;
}

.c1{top:-12px;left:-12px;}
.c2{top:-12px;right:-12px;}
.c3{bottom:-12px;left:-12px;}
.c4{bottom:-12px;right:-12px;}

@keyframes beat{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

/* lời chúc */

#wish{
position:absolute;
color:white;
font-size:22px;
text-align:center;
width:80%;
display:none;
}

</style>
</head>

<body>

<div id="box" onclick="startWish()">

<div class="corner c1">💗</div>
<div class="corner c2">💗</div>
<div class="corner c3">💗</div>
<div class="corner c4">💗</div>

💖 Bấm để mở điều đặc biệt 💖

</div>

<div id="wish"></div>

<script>

/* icon rơi */

const icons=["💓","💞","💖","💗","🎉","🌸","🌷","✨","🐱"]

function createFall(){

const icon=document.createElement("div")
icon.className="fall"
icon.innerText=icons[Math.floor(Math.random()*icons.length)]

icon.style.left=Math.random()*100+"vw"
icon.style.animationDuration=(4+Math.random()*3)+"s"

document.body.appendChild(icon)

setTimeout(()=>icon.remove(),7000)

}

setInterval(createFall,400)

/* lời chúc */

const wishes=[

"Chúc bạn luôn vui vẻ và tràn đầy năng lượng 🌷",
"Chúc bạn luôn xinh đẹp theo cách riêng của mình 💖",
"Chúc bạn học giỏi và đạt được mọi mục tiêu 🌟",
"Chúc bạn mỗi ngày đều có thật nhiều niềm vui 🌸",
"Chúc bạn luôn được yêu thương và quan tâm 💞",
"Chúc bạn có thật nhiều kỷ niệm đẹp tuổi học trò 🎉",
"Chúc bạn luôn tự tin và mạnh mẽ 💗",
"Chúc bạn luôn gặp nhiều may mắn 🍀",
"Chúc bạn có thật nhiều tiếng cười mỗi ngày 😄",
"Chúc bạn luôn rạng rỡ như ánh mặt trời ☀️",
"Chúc bạn luôn giữ được nụ cười xinh 🌷",
"Chúc bạn luôn đạt kết quả tốt trong học tập 📚",
"Chúc bạn có thật nhiều điều bất ngờ dễ thương 💖",
"Chúc bạn luôn được mọi người yêu quý 💞",
"Chúc bạn có thật nhiều năng lượng tích cực ✨",
"Chúc bạn luôn thành công trong tương lai 🌟",
"Chúc bạn có một ngày 8/3 thật tuyệt vời 🌸",
"Chúc bạn luôn hạnh phúc 💗",
"Chúc bạn luôn tỏa sáng theo cách của mình 💫",
"Chúc bạn luôn là chính mình và thật tuyệt vời 🌷"

]

let index=0

function showWish(){

document.getElementById("box").style.display="none"

const w=document.getElementById("wish")
w.style.display="block"

setInterval(()=>{

w.innerText=wishes[index]

index++
if(index>=wishes.length) index=0

},2500)

}

/* tim nổ */

function explodeHearts(){

const hearts=["💓","💞","💖","💗"]

for(let i=0;i<25;i++){

const h=document.createElement("div")
h.innerText=hearts[Math.floor(Math.random()*hearts.length)]
h.style.position="fixed"
h.style.left="50%"
h.style.top="50%"
h.style.fontSize="22px"

const x=(Math.random()-0.5)*600
const y=(Math.random()-0.5)*600

h.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x}px,${y}px)`,opacity:0}
],{
duration:1000,
easing:"ease-out"
})

document.body.appendChild(h)

setTimeout(()=>h.remove(),1000)

}

}

/* bấm box */

function startWish(){

explodeHearts()

setTimeout(()=>{
showWish()
},1000)

}

</script>

</body>
</html>
