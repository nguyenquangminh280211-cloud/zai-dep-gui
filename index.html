<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc mừng 8/3</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff3e7f,#ff6fa3);
font-family:sans-serif;
}

/* BOX */

#startBox{
position:relative;
padding:20px 40px;
border-radius:20px;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(10px);
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 30px rgba(255,255,255,0.5);
transition:0.3s;
}

#startBox:hover{
transform:scale(1.05);
}

/* HEART CORNERS */

.cornerHeart{
position:absolute;
font-size:22px;
animation:heartbeat 1.2s infinite;
}

.topLeft{
top:-12px;
left:-12px;
}

.topRight{
top:-12px;
right:-12px;
}

.bottomLeft{
bottom:-12px;
left:-12px;
}

.bottomRight{
bottom:-12px;
right:-12px;
}

/* HEARTBEAT */

@keyframes heartbeat{
0%{transform:scale(1);}
25%{transform:scale(1.3);}
40%{transform:scale(1);}
60%{transform:scale(1.3);}
100%{transform:scale(1);}
}

/* ICON RƠI */

.fall{
position:fixed;
top:-30px;
font-size:20px;
animation:fall linear forwards;
pointer-events:none;
}

@keyframes fall{
0%{
transform:translateY(-10vh);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0.8;
}
}

</style>
</head>

<body>

<div id="startBox" onclick="openWish()">

💖 Bấm để mở điều đặc biệt 💖

<div class="cornerHeart topLeft">💗</div>
<div class="cornerHeart topRight">💖</div>
<div class="cornerHeart bottomLeft">💞</div>
<div class="cornerHeart bottomRight">💓</div>

</div>

<script>

/* ICON RƠI */

const icons=["💓","💞","💖","💗","🌷","🌹","🌸","🌟","✨","🎉"]

function createIcon(){

const icon=document.createElement("div")

icon.className="fall"
icon.innerText=icons[Math.floor(Math.random()*icons.length)]

icon.style.left=Math.random()*100+"vw"
icon.style.animationDuration=(3+Math.random()*2)+"s"

document.body.appendChild(icon)

setTimeout(()=>{
icon.remove()
},5000)

}

setInterval(createIcon,700)

/* CLICK BOX */

function openWish(){

document.getElementById("startBox").innerHTML="💗 Chúc bạn một ngày 8/3 thật vui 💗"

}

</script>

</body>
</html>
